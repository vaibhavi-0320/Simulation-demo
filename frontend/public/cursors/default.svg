<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feFlood flood-color="#3b82f6" flood-opacity="0.9" result="glowColor" />
      <feComposite in="glowColor" in2="SourceAlpha" operator="in" result="glowShape" />
      <feGaussianBlur in="glowShape" stdDeviation="1.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <polygon
    points="4,2 4,18 8,14 11,20 13,19 10,13 16,13"
    fill="rgba(2,6,23,0.78)"
    stroke="white"
    stroke-width="1.2"
    filter="url(#glow)"
    style="paint-order:stroke"
  />
</svg>

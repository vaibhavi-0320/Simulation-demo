<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feFlood flood-color="#3b82f6" flood-opacity="0.9" result="glowColor" />
      <feComposite in="glowColor" in2="SourceAlpha" operator="in" result="glowShape" />
      <feGaussianBlur in="glowShape" stdDeviation="1.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="12" cy="12" r="9" fill="none" stroke="#1e293b" stroke-width="2.5" />
  <path
    d="M12 3 A9 9 0 0 1 21 12"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    filter="url(#glow)"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 12 12"
      to="360 12 12"
      dur="0.8s"
      repeatCount="indefinite"
    />
  </path>
</svg>
